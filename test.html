<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PHIERS — Enter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-new.css">
  <style>
    body {
      background: #080d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    .modal-entry {
      max-width: 90vw;
      max-height: 90vh;
      text-align: center;
    }
    
    .modal-entry img {
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
      border: 1px solid rgba(61, 220, 132, 0.3);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    
    .enter-button {
      display: block;
      margin: 24px auto 0;
      padding: 12px 32px;
      background: transparent;
      color: #3ddc84;
      border: 1.5px solid rgba(61, 220, 132, 0.5);
      border-radius: 40px;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .enter-button:hover {
      border-color: #3ddc84;
      background: rgba(61, 220, 132, 0.05);
    }
    
    @media (max-width: 768px) {
      .modal-entry img {
        max-height: 60vh;
        max-width: 95vw;
      }
      .enter-button {
        padding: 10px 24px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<div class="modal-entry">
  <img src="Congress_Dont_Work_4U-WEre_changing_that-BIG.jpg" alt="Congress">
  <button class="enter-button" id="enterBtn">Enter Site →</button>
</div>

<script>
  const enterBtn = document.getElementById('enterBtn');
  
  // Check if this is the first visit
  if (!sessionStorage.getItem('gatewaySeen')) {
    // First visit — show modal page, set session, then redirect on click
    sessionStorage.setItem('gatewaySeen', 'true');
    
    enterBtn.addEventListener('click', () => {
     window.location.href = 'index.html';
    });
  } else {
    // Returning visitor — skip modal, go straight to gateway
   window.location.href = 'index.html';
  }
</script>

</body>
</html>
